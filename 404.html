<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="404 Not Found - DVG's Personal Website">
    <meta name="author" content="DVG">
    <title>404 - Page Not Found</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            padding: 5rem 0;
        }

        h1 {
            font-size: 4rem;
            color: #ff4040;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        .error-img {
            max-width: 300px;
            width: 100%;
            margin-bottom: 2rem;
        }

        a {
            font-size: 1rem;
            color: #1d3557;
            text-decoration: none;
            background-color: #f0f9ff;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #1d3557;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404 - Page Not Found</h1>
        <h2>Oops! The page you're looking for doesn't exist.</h2>
        <a href="index.html">Return to Home</a>
    </div>
</body>
</html>
